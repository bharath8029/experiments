<!DOCTYPE html>
<html>

<style>

/* Background */
body{
    background:linear-gradient(to right,#dfe9f3,#ffffff);
    font-family: Arial;
    margin:40px;
}

/* Header */
h1{
    background:#111;
    color:white;
    text-align:center;
    padding:15px;
}

/* Form Design */
form{
    background:white;
    width:40%;
    margin:auto;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px gray;
}

/* Inputs */
input, textarea{
    width:100%;
    padding:8px;
    margin-top:5px;
}

input[type="submit"]{
    background:#27ae60;
    color:white;
    border:none;
    cursor:pointer;
}

input[type="submit"]:hover{
    background:#2ecc71;
}

/* Links */
a{
    text-decoration:none;
    background:#e67e22;
    color:white;
    padding:8px 12px;
    border-radius:5px;
}

</style>

</head>
