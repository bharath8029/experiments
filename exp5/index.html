<!DOCTYPE html>
<html>
<head>
    <title>Advanced Calculator</title>
    <style>
        body {
            background: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial;
        }

        .calc-box {
            background: #1e1e1e;
            padding: 15px;
            border-radius: 15px;
            width: 320px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        #screen {
            width: 100%;
            height: 55px;
            font-size: 22px;
            text-align: right;
            padding: 10px;
            border-radius: 10px;
            border: none;
            margin-bottom: 10px;
            background: #2b2b2b;
            color: #fff;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            height: 50px;
            border-radius: 10px;
            border: none;
            font-size: 16px;
            cursor: pointer;
            background: #333;
            color: white;
            transition: 0.2s;
        }

        button:hover {
            background: #444;
        }

        .op { background: #ff9500; }
        .op:hover { background: #ffa733; }

        .danger { background: #e53935; }
        .mode { background: #555; }

        .sci-panel {
            display: none;
            margin-bottom: 10px;
        }

        .sci-panel.active {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
    </style>
</head>

<body>

<div class="calc-box">
    <input type="text" id="screen" readonly>

    <button class="mode" onclick="toggleSci()">Toggle Scientific</button>

    <!-- Scientific Panel -->
    <div class="sci-panel" id="sci">
        <button onclick="sciFunc('sin')">sin</button>
        <button onclick="sciFunc('cos')">cos</button>
        <button onclick="sciFunc('tan')">tan</button>
        <button onclick="sciFunc('sqrt')">√</button>

        <button onclick="sciFunc('log')">log</button>
        <button onclick="sciFunc('ln')">ln</button>
        <button onclick="addVal(Math.PI)">π</button>
        <button onclick="addVal('^')">^</button>
    </div>

    <!-- Buttons -->
    <div class="grid">
        <button class="danger" onclick="clearAll()">AC</button>
        <button onclick="back()">⌫</button>
        <button class="op" onclick="addVal('/')">÷</button>
        <button class="op" onclick="addVal('*')">×</button>

        <button onclick="addVal(7)">7</button>
        <button onclick="addVal(8)">8</button>
        <button onclick="addVal(9)">9</button>
        <button class="op" onclick="addVal('-')">-</button>

        <button onclick="addVal(4)">4</button>
        <button onclick="addVal(5)">5</button>
        <button onclick="addVal(6)">6</button>
        <button class="op" onclick="addVal('+')">+</button>

        <button onclick="addVal(1)">1</button>
        <button onclick="addVal(2)">2</button>
        <button onclick="addVal(3)">3</button>
        <button class="op" onclick="result()">=</button>

        <button style="grid-column: span 2;" onclick="addVal(0)">0</button>
        <button onclick="addVal('.')">.</button>
    </div>
</div>

<script>
    const screen = document.getElementById("screen");

    function addVal(val) {
        screen.value += val;
    }

    function clearAll() {
        screen.value = "";
    }

    function back() {
        screen.value = screen.value.slice(0, -1);
    }

    function result() {
        try {
            let exp = screen.value.replace(/\^/g, "**");
            screen.value = eval(exp);
        } catch {
            alert("Error!");
        }
    }

    function sciFunc(type) {
        let val = parseFloat(screen.value);
        if (isNaN(val)) {
            alert("Enter number first");
            return;
        }

        let res;
        switch(type) {
            case "sin": res = Math.sin(val * Math.PI/180); break;
            case "cos": res = Math.cos(val * Math.PI/180); break;
            case "tan": res = Math.tan(val * Math.PI/180); break;
            case "sqrt": res = Math.sqrt(val); break;
            case "log": res = Math.log10(val); break;
            case "ln": res = Math.log(val); break;
        }

        screen.value = res;
    }

    function toggleSci() {
        document.getElementById("sci").classList.toggle("active");
    }
</script>

</body>
</html>
